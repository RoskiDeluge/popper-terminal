name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: '--target x86_64-unknown-linux-gnu'
    runs-on: ${{ matrix.platform }}
    env:
      POPPER_PATH: ${{ github.workspace }}/popper
      POPPER_REF: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout popper-terminal
        uses: actions/checkout@v4

      - name: Checkout Popper shell
        shell: bash
        run: |
          git clone https://github.com/RoskiDeluge/popper popper
          cd popper
          if git rev-parse --verify "refs/tags/${POPPER_REF}" >/dev/null 2>&1; then
            git checkout "${POPPER_REF}"
          else
            echo "No matching Popper tag for ${POPPER_REF}; using default branch"
          fi

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            popper -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Popper Terminal ${{ github.ref_name }}'
          releaseBody: 'Automated release for ${{ github.ref_name }}.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
