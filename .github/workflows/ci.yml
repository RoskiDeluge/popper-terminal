name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-22.04
    env:
      POPPER_PATH: ${{ github.workspace }}/popper
    steps:
      - name: Checkout popper-terminal
        uses: actions/checkout@v4

      - name: Checkout Popper shell
        uses: actions/checkout@v4
        with:
          repository: RoskiDeluge/popper
          path: popper

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            popper -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri backend
        run: cargo build --manifest-path src-tauri/Cargo.toml
